# Example fleet registry for agentic-memory-mcp (schema v2).
#
# Copy this file to ./fleet_registry.toml (or any path) and point
# AGENTIC_MEMORY_REGISTRY_PATH at the absolute path of your copy.
#
# Each [[vaults]] row pins one workspace ID to one HTTP endpoint.
# The bridge serves only workspaces that are listed AND `enabled = true`
# AND (if AGENTIC_MEMORY_ALLOWED_WORKSPACES is set) in that allowlist.
#
# For local dev with localhost endpoints, set:
#   AGENTIC_MEMORY_ALLOW_PRIVATE_ENDPOINTS=1

schema_version = "2"

# A workspace served from a local LightRAG instance on port 8020.
[[vaults]]
id = "my_workspace_a"
endpoint = "http://localhost:8020"
backend = "lightrag"
enabled = true
allowed_modes = ["mix", "hybrid", "semantic", "naive"]

# A workspace served from a remote LightRAG host (private IP requires
# AGENTIC_MEMORY_ALLOW_PRIVATE_ENDPOINTS=1 unless you use a public URL).
[[vaults]]
id = "my_workspace_b"
endpoint = "http://10.0.0.42:8030"
backend = "lightrag"
enabled = true
allowed_modes = ["mix", "global", "local"]

# Graphiti metadata-only row (queries are not supported until a Graphiti read path exists).
[[vaults]]
id = "my_workspace_graphiti_staging"
endpoint = "http://localhost:8050"
backend = "graphiti"
graph_namespace = "my_workspace_graphiti_staging"
enabled = false
